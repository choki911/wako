<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f7f9fc;
      --tab-1: #ffb7b2; --tab-2: #ffdac1; --tab-3: #fff9c4;
      --tab-4: #e2f0cb; --tab-5: #b5ead7; --tab-6: #c7ceea;
      /* weather-app 用変数 */
      --w-text-dark: #3a2a1a;
      --w-text-mid:  #6b4c2a;
      --w-accent:    #ff7c43;
      --w-btn:       #ff6b35;
      --w-btn-hover: #e85d2c;
      --w-card-bg:   rgba(255,255,255,0.72);
      --w-shadow:    0 8px 40px rgba(200,120,50,0.18);
    }

    body {
      font-family: 'Yu Gothic', 'Hiragino Kaku Gothic ProN', sans-serif;
      background-color: var(--bg-color);
      margin: 0; display: flex; height: 100vh; overflow: hidden;
    }

    /* サイドバー */
    .sidebar { width: 100px; display: flex; flex-direction: column; height: 100%; }
    .tab {
      flex: 1; display: flex; align-items: center; justify-content: center;
      cursor: pointer; writing-mode: vertical-rl; text-orientation: upright;
      font-weight: bold; font-size: 1.1rem; border: 1px solid rgba(0,0,0,0.05);
      transition: all 0.2s; opacity: 0.7;
    }
    .tab.active { width: 125px; opacity: 1; z-index: 10; font-size: 1.2rem; }
    .sidebar-left .tab.active { border-radius: 0 20px 20px 0; box-shadow: 5px 0 15px rgba(0,0,0,0.1); }
    .sidebar-right .tab.active { border-radius: 20px 0 0 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }

    /* メインエリア */
    .main-container {
      flex: 1; background: white; margin: 15px; border-radius: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 30px; text-align: center; position: relative;
    }

    .page { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
    .page.active { display: flex; animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ボタン */
    .action-btn {
      padding: 20px 40px; font-size: 2rem; font-weight: bold; color: white;
      border: none; border-radius: 60px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.15);
      margin: 10px; transition: all 0.1s; width: 80%; max-width: 500px;
    }
    .action-btn:active { transform: scale(0.98); }

    .btn-greet { background: linear-gradient(135deg, #ff9a9e, #fecfef); }
    .btn-song { background-color: #ff7f50; box-shadow: 0 10px 0 #d35400; }
    .btn-yobina { background-color: #2ecc71; box-shadow: 0 10px 0 #27ae60; padding: 40px; font-size: 3rem; }
    .btn-weather { background: linear-gradient(135deg, #a1c4fd, #c2e9fb); color: #333; }
    .btn-schedule { background: linear-gradient(135deg, #84fab0, #8fd3f4); color: #2d5a27; }
    .btn-lunch { background: linear-gradient(135deg, #f5576c, #f093fb); }

    /* 表示コンテンツ */
    .grid-container { 
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
      gap: 15px; width: 95%; max-height: 55%; overflow-y: auto; padding: 10px; margin-bottom: 10px;
    }
    .card { 
      background: #f9f9f9; padding: 20px; border-radius: 20px; font-size: 1.6rem; 
      font-weight: bold; border: 5px solid #eee; transition: all 0.3s;
    }
    .card.speaking { 
      background: #fff9c4; border-color: #ffeb3b; transform: scale(1.05); 
      box-shadow: 0 0 20px rgba(255,235,59,0.5);
    }
    .card.done { background: #e2f0cb; border-color: #b5ead7; opacity: 0.8; }

    .menu-box { background: #fff5f8; border-radius: 25px; padding: 25px; width: 85%; min-height: 200px; margin-bottom: 15px; overflow-y: auto; }
    .menu-item { 
      font-size: 1.6rem; margin: 8px 0; text-align: left; padding-left: 10%; color: #444;
      animation: slideIn 0.5s ease-out forwards;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

    /* ============================================
       weather-app 統合スタイル
       ============================================ */
    .weather-card {
      background: linear-gradient(170deg, #ffe0a0 0%, #ffb347 40%, #ff8c42 75%, #e8663a 100%);
      border-radius: 32px; padding: 32px 40px 36px; max-width: 480px; width: 92%;
      box-shadow: var(--w-shadow), inset 0 1px 0 rgba(255,255,255,0.5);
      border: 1.5px solid rgba(255,255,255,0.4); text-align: center; position: relative; overflow: hidden;
    }
    .w-cloud-bg { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.15); filter: blur(40px); pointer-events: none; }
    .wc1 { width: 300px; height: 100px; top: 5%;  left: -60px; }
    .wc2 { width: 200px; height:  80px; top: 12%; right: 20px; }
    .wc3 { width: 360px; height: 100px; bottom: 10%; left: -40px; }
    .w-location { font-family: 'Kaisei Decol', serif; font-size: 0.95rem; color: var(--w-text-mid); letter-spacing: 0.12em; margin-bottom: 4px; position: relative; }
    .w-date-display { font-family: 'Kaisei Decol', serif; font-size: 1.6rem; color: var(--w-text-dark); font-weight: 700; margin-bottom: 20px; position: relative; }
    .weather-art { font-size: 110px; line-height: 1; margin: 0 auto 12px; filter: drop-shadow(0 6px 18px rgba(200,100,30,0.25)); animation: w-floatArt 4s ease-in-out infinite; display: block; position: relative; }
    @keyframes w-floatArt { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .weather-label { font-family: 'Kaisei Decol', serif; font-size: 1.9rem; font-weight: 700; color: var(--w-text-dark); margin-bottom: 4px; position: relative; }
    .weather-desc { font-size: 0.92rem; color: var(--w-text-mid); min-height: 2rem; line-height: 1.6; margin-bottom: 18px; position: relative; }
    .w-stats { display: flex; gap: 12px; justify-content: center; margin-bottom: 22px; flex-wrap: wrap; position: relative; }
    .w-stat { background: rgba(255,180,80,0.25); border-radius: 14px; padding: 10px 18px; min-width: 95px; }
    .w-stat-label { font-size: 0.72rem; color: var(--w-text-mid); margin-bottom: 3px; }
    .w-stat-value { font-family: 'Kaisei Decol', serif; font-size: 1.35rem; font-weight: 700; color: var(--w-text-dark); }
    .w-fetch-btn { background: linear-gradient(135deg, var(--w-btn), #ff9a3c); color: #fff; border: none; border-radius: 999px; padding: 16px 38px; font-family: 'Zen Maru Gothic', sans-serif; font-size: 1.1rem; font-weight: 700; cursor: pointer; box-shadow: 0 6px 24px rgba(255,107,53,0.45); transition: all 0.15s; letter-spacing: 0.08em; position: relative; }
    .w-fetch-btn:hover { background: linear-gradient(135deg, var(--w-btn-hover), #ff7e20); transform: translateY(-2px); box-shadow: 0 10px 32px rgba(255,107,53,0.55); }
    .w-fetch-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .w-loading { display: none; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 16px; position: relative; }
    .w-spinner { width: 44px; height: 44px; border: 5px solid rgba(255,150,50,0.25); border-top-color: var(--w-accent); border-radius: 50%; animation: w-spin 0.9s linear infinite; }
    @keyframes w-spin { to { transform: rotate(360deg); } }
    .w-weather-content { display: none; position: relative; }
    .w-error-msg { display: none; color: #c0392b; font-size: 0.88rem; margin-bottom: 10px; padding: 8px 14px; background: rgba(255,100,100,0.14); border-radius: 10px; position: relative; }
    .w-speak-btn { background: none; border: 2px solid var(--w-accent); color: var(--w-accent); border-radius: 999px; padding: 9px 24px; font-size: 0.9rem; cursor: pointer; margin-top: 10px; transition: all 0.2s; display: none; position: relative; }
    .w-speak-btn:hover { background: var(--w-accent); color: #fff; }
  </style>
</head>

      const speakBtn = document.getElementById('wSpeakBtn');

      btn.disabled = true;
      errorMsg.style.display = 'none';
      content.style.display = 'none';
      speakBtn.style.display = 'none';
      loading.style.display = 'flex';

      try {
        const lat = 35.6285, lon = 140.1512;
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max,windspeed_10m_max&timezone=Asia%2FTokyo&forecast_days=1`;
        const res = await fetch(url);
        const data = await res.json();
        const d = data.daily;
        const info = getWeatherInfo(d.weathercode[0]);

        document.getElementById('weatherArt').textContent = info.emoji;
        document.getElementById('weatherLabel').textContent = info.label;
        document.getElementById('weatherDesc').textContent = info.desc;
        document.getElementById('tempMax').textContent = `${Math.round(d.temperature_2m_max[0])}°C`;
        document.getElementById('tempMin').textContent = `${Math.round(d.temperature_2m_min[0])}°C`;
        document.getElementById('precip').textContent = `${d.precipitation_probability_max[0]}%`;
        document.getElementById('wind').textContent = `${Math.round(d.windspeed_10m_max[0])}m/s`;

        currentSpeechText = `${today.getMonth()+1}月${today.getDate()}日の加曽利町のお天気は、${info.label}です。${info.desc} 最高気温は${Math.round(d.temperature_2m_max[0])}度、最低気温は${Math.round(d.temperature_2m_min[0])}度です。`;

        loading.style.display = 'none';
        content.style.display = 'block';
        speakBtn.style.display = 'inline-block';
        btn.textContent = '🔄 更新する';
        btn.disabled = false;
        speakWeather();
      } catch(e) {
        loading.style.display = 'none';
        errorMsg.textContent = '⚠️ 天気を取得できませんでした。';
        errorMsg.style.display = 'block';
        btn.disabled = false;
      }
    }

    function speakWeather() {
      if (!currentSpeechText) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(currentSpeechText);
      u.lang = 'ja-JP';
      window.speechSynthesis.speak(u);
    }

    // 共通
    window.onload = () => {
      document.getElementById('dateDisplay').textContent = `${today.getMonth()+1}月${today.getDate()}日（${weekDays[today.getDay()]}）`;
      renderScheduleStatic();
      showPage(1);
    };

    function showPage(num) {
      currentPage = num;
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page' + num).classList.add('active');
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-t-' + num).forEach(t => t.classList.add('active'));
      window.speechSynthesis.cancel();
    }

    function renderScheduleStatic() {
      const today_str = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      const items = SCHEDULE_DB[today_str] || [{s:"予定はありません", i:"🌸"}];
      const container = document.getElementById('scheduleList');
      container.innerHTML = "";
      items.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `sch-card-${idx}`;
        card.innerHTML = `<span style="font-size:2rem">${item.i}</span><br>${item.s}`;
        container.appendChild(card);
      });
    }

    async function revealSchedule() {
      const btn = document.getElementById('btnRevealSchedule');
      btn.disabled = true;
      const today_str = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      const items = SCHEDULE_DB[today_str];
      if (!items) { speak("今日の予定はありません。"); btn.disabled = false; return; }
      speak("今日の予定を発表します。");
      await new Promise(r => setTimeout(r, 2000));
      for (let i = 0; i < items.length; i++) {
        const card = document.getElementById(`sch-card-${i}`);
        card.classList.add('speaking');
        await speakPromise(items[i].s + "。");
        card.classList.remove('speaking');
        card.classList.add('done');
      }
      speak("以上です。");
      btn.disabled = false;
    }

    async function revealLunch() {
      const btn = document.getElementById('btnRevealLunch');
      btn.disabled = true;
      const day = today.getDate();
      const menu = MENU_DB[day];
      const container = document.getElementById('menuContent');
      container.innerHTML = "";
      if (!menu) { speak("今日の給食はありません。"); btn.disabled = false; return; }
      speak("今日の給食を発表します！");
      await new Promise(r => setTimeout(r, 2000));
      for (const item of menu) {
        const div = document.createElement('div');
        div.className = 'menu-item';
        div.innerHTML = `✨ ${item}`;
        container.appendChild(div);
        await speakPromise(item);
      }
      speak("残さず食べましょう！");
      btn.disabled = false;
    }

    function speakPromise(text) {
      return new Promise((resolve) => {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'ja-JP';
        u.onend = () => resolve();
        window.speechSynthesis.speak(u);
      });
    }

    function speak(text) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ja-JP';
      window.speechSynthesis.speak(u);
    }

    function playSong()   { const a = document.getElementById('audioSong'); a.currentTime = 0; a.play(); }
    function playYobina() { const a = document.getElementById('audioYobina'); a.currentTime = 0; a.play(); }

    window.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'p') {
        if (currentPage === 1) playSong();
        if (currentPage === 2) playYobina();
        if (currentPage === 3) fetchWeather(); 
        if (currentPage === 4) revealSchedule();
        if (currentPage === 5) revealLunch();
        if (currentPage === 6) speak('これで終わります。れい！');
      }
    });
  </script>
</body>
</html>
