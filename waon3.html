<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音符のキラキラ花火 - 心地よい和音Ver.</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #001220 0%, #000000 100%);
            touch-action: none; /* 電子黒板のタッチ操作を安定させる */
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// --- 設定 ---
let audioCtx = null;
let stars = [];
let notes = [];
let sparkles = [];

// 心地よいコード進行（メジャーコード系）
const scales = [
    [261.63, 329.63, 392.00, 523.25], // C (ド・ミ・ソ・ド)
    [349.23, 440.00, 523.25, 698.46], // F (ファ・ラ・ド・ファ)
    [392.00, 493.88, 587.33, 783.99], // G (ソ・シ・レ・ソ)
    [293.66, 369.99, 440.00, 587.33]  // D (レ・ファ#・ラ・レ)
];

// --- 初期化・リサイズ ---
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    createStars();
}
window.addEventListener('resize', resize);

// 星空の生成
function createStars() {
    stars = [];
    const numStars = Math.floor((canvas.width * canvas.height) / 5000);
    for (let i = 0; i < numStars; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 1.5,
            blinkSpeed: Math.random() * 0.05 + 0.01,
            opacity: Math.random()
        });
    }
}

// --- オーディオ処理 ---
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function playTone(freq, startTime, duration, volume = 0.2) {
    const osc = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = 'triangle';
    osc2.type = 'sine';
    osc.frequency.setValueAtTime(freq, startTime);
    osc2.frequency.setValueAtTime(freq * 2, startTime); // 倍音

    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(volume, startTime + 0.08); // 優しく立ち上がる
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

    osc.connect(gain);
    osc2.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(startTime);
    osc2.start(startTime);
    osc.stop(startTime + duration);
    osc2.stop(startTime + duration);
}

function playMelody() {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    const melody = scales[Math.floor(Math.random() * scales.length)];
    const now = audioCtx.currentTime;
    const tempo = 0.3; // ゆっくりした間隔

    // 1音ずつ順番に
    melody.forEach((freq, index) => {
        playTone(freq, now + index * tempo, 0.8, 0.15);
    });

    // 最後に和音
    const chordTime = now + melody.length * tempo + 0.1;
    melody.forEach((freq) => {
        playTone(freq, chordTime, 1.8, 0.3);
    });
}

// --- 視覚エフェクト ---
class Note {
    constructor(x, y, hue) {
        this.x = x;
        this.y = y;
        this.hue = hue;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3 + 1;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.gravity = 0.05;
        this.friction = 0.98;
        this.size = Math.random() * 20 + 30;
        this.opacity = 1;
        this.symbol = ['♪', '♫', '♬', '♩'][Math.floor(Math.random() * 4)];
    }
    update() {
        this.vx *= this.friction;
        this.vy *= this.friction;
        this.vy += this.gravity;
        this.x += this.vx;
        this.y += this.vy;
        this.opacity -= 0.01;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.shadowBlur = 15;
        ctx.shadowColor = `hsl(${this.hue}, 100%, 70%)`;
        ctx.fillStyle = `hsl(${this.hue}, 80%, 80%)`;
        ctx.font = `${this.size}px serif`;
        ctx.fillText(this.symbol, this.x, this.y);
        ctx.restore();
    }
}

class Sparkle {
    constructor(x, y, hue) {
        this.x = x;
        this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 6 + 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.size = Math.random() * 3 + 1;
        this.opacity = 1;
        this.color = `hsl(${hue + (Math.random()-0.5)*40}, 100%, 80%)`;
    }
    update() {
        this.vx *= 0.95;
        this.vy *= 0.95;
        this.vy += 0.05;
        this.x += this.vx;
        this.y += this.vy;
        this.opacity -= 0.02;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

// --- メインループ ---
function animate() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 星の描画
    stars.forEach(star => {
        star.opacity += star.blinkSpeed;
        if (star.opacity > 1 || star.opacity < 0) star.blinkSpeed = -star.blinkSpeed;
        ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, star.opacity)})`;
        ctx.fillRect(star.x, star.y, star.size, star.size);
    });

    ctx.globalCompositeOperation = 'lighter';
    notes = notes.filter(n => n.opacity > 0);
    notes.forEach(n => { n.update(); n.draw(); });

    sparkles = sparkles.filter(s => s.opacity > 0);
    sparkles.forEach(s => { s.update(); s.draw(); });
    ctx.globalCompositeOperation = 'source-over';

    requestAnimationFrame(animate);
}

// タッチイベント
canvas.addEventListener('pointerdown', (e) => {
    playMelody();
    const hue = Math.random() * 360;
    for (let i = 0; i < 8; i++) notes.push(new Note(e.clientX, e.clientY, hue));
    for (let i = 0; i < 25; i++) sparkles.push(new Sparkle(e.clientX, e.clientY, hue));
});

resize();
animate();
</script>
</body>
</html>
