<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Controller</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            user-select: none; /* テキスト選択を防止 */
        }

        /* 波形ビジュアライザーのスタイル */
        .visualizer-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            height: 100px;
            margin-bottom: 50px;
        }

        .bar {
            width: 8px;
            height: 20px;
            background-color: #4CAF50;
            border-radius: 4px;
            transition: height 0.2s ease;
        }

        /* 再生中のアニメーション */
        .playing .bar {
            animation: wave 1.2s infinite ease-in-out;
        }

        .playing .bar:nth-child(1) { animation-delay: 0.0s; }
        .playing .bar:nth-child(2) { animation-delay: 0.1s; }
        .playing .bar:nth-child(3) { animation-delay: 0.2s; }
        .playing .bar:nth-child(4) { animation-delay: 0.3s; }
        .playing .bar:nth-child(5) { animation-delay: 0.4s; }
        .playing .bar:nth-child(6) { animation-delay: 0.3s; }
        .playing .bar:nth-child(7) { animation-delay: 0.2s; }
        .playing .bar:nth-child(8) { animation-delay: 0.1s; }

        @keyframes wave {
            0%, 100% { height: 20px; background-color: #4CAF50; }
            50% { height: 80px; background-color: #81C784; }
        }

        /* ボタンのスタイル */
        #playBtn {
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background-color: #ff4757;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s, background-color 0.2s;
            outline: none;
        }

        #playBtn:active {
            transform: scale(0.95);
            background-color: #e84118;
        }

        .instruction {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- 波形エリア -->
    <div class="visualizer-container" id="visualizer">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar) "></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>

    <!-- 再生ボタン -->
    <button id="playBtn">▶ スタート</button>

    <div class="instruction">ボタンを押すか、キーボードの「P」を押し続けてください</div>

    <!-- オーディオ要素 -->
    <audio id="myAudio" src="1.mp3" preload="auto"></audio>

    <script>
        const audio = document.getElementById('myAudio');
        const playBtn = document.getElementById('playBtn');
        const visualizer = document.getElementById('visualizer');
        
        let isPlaying = false;

        // 再生開始の処理
        function startPlayback() {
            if (!isPlaying) {
                audio.play().catch(e => console.log("再生エラー:", e));
                visualizer.classList.add('playing');
                isPlaying = true;
            }
        }

        // 停止の処理
        function stopPlayback() {
            if (isPlaying) {
                audio.pause();
                visualizer.classList.remove('playing');
                isPlaying = false;
            }
        }

        // --- マウス・タッチイベント ---
        // PC用
        playBtn.addEventListener('mousedown', startPlayback);
        window.addEventListener('mouseup', stopPlayback);

        // スマホ/タブレット用
        playBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startPlayback();
        });
        playBtn.addEventListener('touchend', stopPlayback);

        // --- キーボードイベント ---
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'p') {
                startPlayback();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() === 'p') {
                stopPlayback();
            }
        });

        // 音声が最後まで再生された時の処理
        audio.addEventListener('ended', () => {
            visualizer.classList.remove('playing');
            isPlaying = false;
        });

    </script>
</body>
</html>
